spring.application.name=nextdoorcs
server.port=${PORT:8080}

# ── Gemini API ────────────────────────────────────────────────────────────────
# 로컬 기본 모델은 접근성이 높은 flash 계열 사용. 상위 모델은 GEMINI_MODEL로 명시 설정.
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-3.5-flash}

# ── CORS ─────────────────────────────────────────────────────────────────────
# 로컬 개발: http://localhost:3000
# Render 배포 시: https://nextdoor-cs.vercel.app
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000}

# ── Rate Limiting ─────────────────────────────────────────────────────────────
# IP별 일일 최대 진단 횟수 (비용 폭증 방지)
ratelimit.daily-limit=${RATE_LIMIT_DAILY:5}

# ── JPA/DB (Phase 10 활성화) ──────────────────────────────────────────────────
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# ── 파일 업로드 크기 제한 (이미지 + 오디오 + iPhone HEVC 영상 fallback) ───────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ── 로깅 ─────────────────────────────────────────────────────────────────────
logging.level.com.nextdoorcs=DEBUG
