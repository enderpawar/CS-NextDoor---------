services:
  - type: web
    name: nextdoor-cs-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-pro-preview
      - key: RATE_LIMIT_DAILY
        value: "5"
      - key: ALLOWED_ORIGINS
        value: https://nextdoor-cs.vercel.app
